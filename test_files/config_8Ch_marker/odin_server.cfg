[server]
debug_mode  = 0
http_port   = 8888
http_addr   = 0.0.0.0
static_path = /odin/python/static
adapters    = fp, fr, meta_listener, xspress

[tornado]
logging = error

[adapter.xspress]
module = xspress_detector.control.adapter.XspressAdapter
endpoint = 127.0.0.1:12000
num_cards = 4
num_tf = 12216
base_ip = 192.168.0.1
max_channels = 8
max_spectra = 4096
settings_path = /home/xspress3/xspress3_settings/8channel
run_flags = 2
debug = 1
num_process = 4
daq_endpoints = tcp://127.0.0.1:15150,tcp://127.0.0.1:15151,tcp://127.0.0.1:15152,tcp://127.0.0.1:15153

[adapter.fp]
module = xspress_detector.control.fp_xspress_adapter.FPXspressAdapter
endpoints = 127.0.0.1:10004,127.0.0.1:10014,127.0.0.1:10024,127.0.0.1:10034
fr_adapter_name = fr
update_interval = 0.2

[adapter.fr]
module = odin_data.control.frame_receiver_adapter.FrameReceiverAdapter
endpoints = 127.0.0.1:10000,127.0.0.1:10010,127.0.0.1:10020,127.0.0.1:10030
update_interval = 0.2

[adapter.meta_listener]
module = odin_data.control.meta_listener_adapter.MetaListenerAdapter
endpoints = 127.0.0.1:5659
update_interval = 0.5
